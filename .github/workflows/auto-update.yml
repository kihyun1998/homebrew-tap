name: auto-update

# 각 도구의 최신 릴리스를 폴링해 Formula를 자동 갱신한다.
# 공개 릴리스 데이터만 읽고(인증 불필요) 이 레포 자신의 토큰으로 커밋하므로 PAT가 필요 없다.
on:
  schedule:
    - cron: "0 * * * *" # 매시 정각
  workflow_dispatch: {} # 수동 실행 버튼

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Update jtic formula
        run: |
          set -euo pipefail
          # 다른(공개) 레포의 릴리스는 인증 없는 공개 API로 읽는다.
          # Actions 기본 토큰은 자기 레포에만 스코프돼 cross-repo 호출은 404가 난다.
          latest=$(curl -fsSL https://api.github.com/repos/kihyun1998/just-tic/releases/latest | jq -r .tag_name)
          v="${latest#v}"
          cur=$(grep -oP 'version "\K[^"]+' Formula/jtic.rb)
          if [ "$v" = "$cur" ]; then
            echo "이미 최신 ($cur) — 변경 없음"
            exit 0
          fi
          echo "갱신: $cur -> $v"
          base="https://github.com/kihyun1998/just-tic/releases/download/v$v"
          sha() { curl -sSL "$1" -o t.bin; sha256sum t.bin | cut -d' ' -f1; }
          mac_arm=$(sha "$base/jtic-v$v-aarch64-apple-darwin.tar.gz")
          mac_x64=$(sha "$base/jtic-v$v-x86_64-apple-darwin.tar.gz")
          linux=$(sha "$base/jtic-v$v-x86_64-unknown-linux-gnu.tar.gz")
          rm -f t.bin
          cat > Formula/jtic.rb <<EOF
          class Jtic < Formula
            desc "오늘 git 커밋에서 추가/삭제한 줄 수(+/-)를 한 줄로 보여주는 CLI"
            homepage "https://github.com/kihyun1998/just-tic"
            version "$v"
            license any_of: ["MIT", "Apache-2.0"]

            on_macos do
              on_arm do
                url "$base/jtic-v$v-aarch64-apple-darwin.tar.gz"
                sha256 "$mac_arm"
              end
              on_intel do
                url "$base/jtic-v$v-x86_64-apple-darwin.tar.gz"
                sha256 "$mac_x64"
              end
            end

            on_linux do
              on_intel do
                url "$base/jtic-v$v-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "$linux"
              end
            end

            def install
              bin.install "jtic"
            end

            test do
              assert_match "jtic #{version}", shell_output("#{bin}/jtic --version")
            end
          end
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "jtic $v 자동 업데이트"
          git push

      - name: Update just-shield formula
        run: |
          set -euo pipefail
          latest=$(curl -fsSL https://api.github.com/repos/kihyun1998/just-shield/releases/latest | jq -r .tag_name)
          v="${latest#v}"
          cur=$(grep -oP 'version "\K[^"]+' Formula/just-shield.rb)
          if [ "$v" = "$cur" ]; then
            echo "이미 최신 ($cur) — 변경 없음"
            exit 0
          fi
          echo "갱신: $cur -> $v"
          base="https://github.com/kihyun1998/just-shield/releases/download/v$v"
          # 해시는 바이너리를 다시 받아 계산하지 않고 릴리스의 SHA256SUMS에서 읽는다
          # — 릴리스 워크플로가 출처 증명(attestation)을 발급한 바로 그 파일이다.
          curl -fsSL "$base/SHA256SUMS" -o sums.txt
          sha() { awk -v f="$1" '$2 == f {print $1}' sums.txt; }
          mac_arm=$(sha "just-shield-v$v-aarch64-apple-darwin.tar.gz")
          mac_x64=$(sha "just-shield-v$v-x86_64-apple-darwin.tar.gz")
          linux_arm=$(sha "just-shield-v$v-aarch64-unknown-linux-musl.tar.gz")
          linux_x64=$(sha "just-shield-v$v-x86_64-unknown-linux-musl.tar.gz")
          for h in "$mac_arm" "$mac_x64" "$linux_arm" "$linux_x64"; do
            if [ -z "$h" ]; then
              echo "SHA256SUMS에 항목이 없습니다 — 릴리스가 불완전할 수 있어 갱신을 중단합니다" >&2
              exit 1
            fi
          done
          rm sums.txt
          cat > Formula/just-shield.rb <<EOF
          class JustShield < Formula
            desc "GitHub Actions 워크플로가 받아 쓰는 액션을 실행 전에 검사하는 공급망 스캐너"
            homepage "https://github.com/kihyun1998/just-shield"
            version "$v"
            license any_of: ["MIT", "Apache-2.0"]

            on_macos do
              on_arm do
                url "$base/just-shield-v$v-aarch64-apple-darwin.tar.gz"
                sha256 "$mac_arm"
              end
              on_intel do
                url "$base/just-shield-v$v-x86_64-apple-darwin.tar.gz"
                sha256 "$mac_x64"
              end
            end

            on_linux do
              on_arm do
                url "$base/just-shield-v$v-aarch64-unknown-linux-musl.tar.gz"
                sha256 "$linux_arm"
              end
              on_intel do
                url "$base/just-shield-v$v-x86_64-unknown-linux-musl.tar.gz"
                sha256 "$linux_x64"
              end
            end

            def install
              bin.install "just-shield"
            end

            test do
              system bin/"just-shield", "scan", testpath.to_s
            end
          end
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "just-shield $v 자동 업데이트"
          git push
